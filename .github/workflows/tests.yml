on:
    push:
        branches:
            - main
            - v3-simplified

    pull_request:

jobs:
    check:
        name: 'Foundry Tests'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v2
              with:
                  submodules: recursive

            - name: Setup Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: 18
                  cache: 'yarn'

            - name: Install Foundry
              uses: onbjerg/foundry-toolchain@v1
              with:
                  version: v0.3.0

            - name: Install dependencies
              run: |
                  forge install
                  yarn

            - name: Run forge build
              run: make build
              id: build
              env:
                  SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}

            - name: Run unit tests with Sepolia fork
              run: make test
              env:
                  SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}

            - name: Run invariant tests
              run: make test_invariant
            
            - name: Run fork tests (mainnet)
              run: make test_fork
              env:
                  ETH_RPC_URL: https://1rpc.io/eth

            - name: Notify bulla-registry
              if: github.ref == 'refs/heads/main' && github.event_name == 'push'
              run: |
                  curl -X POST \
                    -H "Authorization: Bearer ${{ secrets.REGISTRY_DISPATCH_TOKEN }}" \
                    https://api.github.com/repos/bulla-network/bulla-registry/dispatches \
                    -d '{"event_type":"source-updated","client_payload":{"repo":"${{ github.repository }}"}}'
